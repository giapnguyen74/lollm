<svg viewBox="0 0 780 980" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img">
  <title>CausalLM model architecture</title>
  <desc>Token ids flow through an embedding, a stack of 24 decoder layers each with pre-norm attention and SwiGLU MLP residual blocks, a final norm, and an LM head producing logits that are sampled into the next token.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="ahi" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="780" height="980" fill="#ffffff"/>

  <!-- ============ MAIN SPINE ============ -->
  <rect x="180" y="24" width="240" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="42" text-anchor="middle" font-size="14" fill="#111827">input_ids</text>
  <text x="300" y="58" text-anchor="middle" font-size="11" fill="#6b7280">token ids (B, T)</text>
  <line x1="300" y1="68" x2="300" y2="90" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="92" width="240" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="110" text-anchor="middle" font-size="14" fill="#111827">model.embed_tokens</text>
  <text x="300" y="126" text-anchor="middle" font-size="11" fill="#6b7280">Embedding · vocab → hidden</text>
  <line x1="300" y1="136" x2="300" y2="172" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ====== DECODER LAYER CONTAINER ====== -->
  <rect x="108" y="168" width="472" height="516" rx="12" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="124" y="190" font-size="12" fill="#6b7280" font-style="italic">model.layers — DecoderLayer × 24</text>

  <rect x="180" y="204" width="240" height="38" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="228" text-anchor="middle" font-size="13" fill="#111827">input_layernorm · RMSNorm</text>
  <line x1="300" y1="242" x2="300" y2="262" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="262" width="240" height="86" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="284" text-anchor="middle" font-size="14" fill="#111827">self_attn</text>
  <text x="300" y="303" text-anchor="middle" font-size="11" fill="#6b7280">q / k / v / o projections</text>
  <text x="300" y="320" text-anchor="middle" font-size="11" fill="#6b7280">GQA · scaled-dot attention</text>
  <text x="300" y="337" text-anchor="middle" font-size="11" fill="#6b7280">causal mask</text>
  <line x1="300" y1="348" x2="300" y2="360" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <circle cx="300" cy="376" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="381" text-anchor="middle" font-size="15" fill="#111827">+</text>
  <line x1="300" y1="390" x2="300" y2="410" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="410" width="240" height="38" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="434" text-anchor="middle" font-size="13" fill="#111827">post_attention_layernorm</text>
  <line x1="300" y1="448" x2="300" y2="468" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="468" width="240" height="72" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="492" text-anchor="middle" font-size="14" fill="#111827">mlp</text>
  <text x="300" y="511" text-anchor="middle" font-size="11" fill="#6b7280">SwiGLU</text>
  <text x="300" y="528" text-anchor="middle" font-size="11" fill="#6b7280">down( silu(gate)·up )</text>
  <line x1="300" y1="540" x2="300" y2="552" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <circle cx="300" cy="568" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="573" text-anchor="middle" font-size="15" fill="#111827">+</text>
  <line x1="300" y1="582" x2="300" y2="660" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="312" y="628" font-size="10" fill="#6b7280">loop ×24</text>

  <!-- residual bypasses -->
  <polyline points="300,180 138,180 138,376 285,376" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="92" y="280" font-size="10" fill="#6b7280" transform="rotate(-90 92 280)">residual</text>
  <polyline points="300,394 158,394 158,568 285,568" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- ====== RIGHT-SIDE MECHANISMS ====== -->
  <rect x="606" y="256" width="160" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="686" y="274" text-anchor="middle" font-size="13" fill="#2563eb">RoPE</text>
  <text x="686" y="290" text-anchor="middle" font-size="10" fill="#2563eb">rotate Q, K by position</text>
  <line x1="606" y1="290" x2="420" y2="300" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ahi)"/>

  <rect x="606" y="312" width="160" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="686" y="330" text-anchor="middle" font-size="13" fill="#2563eb">KV cache</text>
  <text x="686" y="346" text-anchor="middle" font-size="10" fill="#2563eb">store &amp; reuse K, V / layer</text>
  <line x1="606" y1="330" x2="420" y2="320" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ahi)"/>

  <!-- ====== LOWER SPINE ====== -->
  <rect x="180" y="660" width="240" height="40" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="685" text-anchor="middle" font-size="13" fill="#111827">model.norm · RMSNorm</text>
  <line x1="300" y1="700" x2="300" y2="720" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="720" width="240" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="738" text-anchor="middle" font-size="14" fill="#111827">lm_head</text>
  <text x="300" y="754" text-anchor="middle" font-size="11" fill="#6b7280">Linear · hidden → vocab</text>
  <line x1="300" y1="764" x2="300" y2="784" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="784" width="240" height="40" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="300" y="809" text-anchor="middle" font-size="13" fill="#111827">logits (B, T, vocab)</text>
  <line x1="300" y1="824" x2="300" y2="844" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="180" y="844" width="240" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="300" y="862" text-anchor="middle" font-size="14" fill="#2563eb">sample_next</text>
  <text x="300" y="878" text-anchor="middle" font-size="11" fill="#2563eb">penalty · temp · top-k/p</text>

  <!-- autoregressive loop -->
  <polyline points="180,866 64,866 64,114 178,114" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ahi)"/>
  <text x="52" y="490" font-size="10" fill="#2563eb" transform="rotate(-90 52 490)">next token → feed back (autoregressive)</text>

  <!-- legend -->
  <text x="606" y="392" font-size="10" fill="#6b7280">— grey: learned weights</text>
  <text x="606" y="408" font-size="10" fill="#2563eb">— blue: position / memory / sampling</text>
</svg>
