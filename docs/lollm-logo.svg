<svg viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img">
  <title>lollm — learn only LLM</title>
  <desc>lollm logo: a blue rounded-square icon of stacked bars (text lines / transformer layers) beside the wordmark "lollm" with "llm" in blue, and the tagline LEARN ONLY LLM.</desc>

  <!-- icon: stacked bars = lines of text (learning) / transformer layer stack -->
  <rect x="8" y="18" width="84" height="84" rx="20" fill="#2563eb"/>
  <rect x="28" y="42" width="44" height="9" rx="4.5" fill="#ffffff"/>
  <rect x="28" y="58" width="34" height="9" rx="4.5" fill="#ffffff"/>
  <rect x="28" y="74" width="26" height="9" rx="4.5" fill="#ffffff" opacity="0.65"/>

  <!-- wordmark: lo (ink) + llm (blue) -->
  <text x="112" y="76" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#111827">lo</tspan><tspan fill="#2563eb">llm</tspan>
  </text>
  <text x="115" y="100" font-size="13" fill="#6b7280" letter-spacing="3.5">LEARN ONLY LLM</text>
</svg>
