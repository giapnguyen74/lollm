<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img">
  <title>Loader → probe → route → modeling_&lt;family&gt;</title>
  <desc>A spec (HF repo, local cache, or .gguf) plus a prompt goes into a loader that produces config/metadata, weights, and a tokenizer. The architecture is probed from model_type or general.architecture and routed to a self-contained modeling_family.py, which runs end-to-end to produce text. Modeling files are duplicated on purpose for study clarity.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/></marker>
    <marker id="ai" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="560" fill="#ffffff"/>

  <!-- spec -->
  <rect x="290" y="22" width="220" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="400" y="44" text-anchor="middle" font-size="13" fill="#111827">model spec + prompt</text>
  <text x="400" y="62" text-anchor="middle" font-size="10" fill="#6b7280">HF repo · local cache · .gguf</text>
  <line x1="400" y1="78" x2="400" y2="98" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- 1. loader -->
  <rect x="250" y="98" width="300" height="58" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="400" y="120" text-anchor="middle" font-size="13" fill="#2563eb">1 · Loader</text>
  <text x="400" y="138" text-anchor="middle" font-size="10" fill="#2563eb">fetch + dequant → config · raw weights (file names) · tokenizer</text>
  <line x1="400" y1="156" x2="400" y2="176" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- 2. probe + route -->
  <rect x="250" y="176" width="300" height="52" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="400" y="197" text-anchor="middle" font-size="13" fill="#2563eb">2 · Probe + route</text>
  <text x="400" y="214" text-anchor="middle" font-size="10" fill="#2563eb">model_type / general.architecture → pick the file</text>
  <line x1="400" y1="228" x2="400" y2="246" stroke="#6b7280" stroke-width="1.5"/>

  <!-- fan to modeling files -->
  <line x1="160" y1="246" x2="640" y2="246" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="160" y1="246" x2="160" y2="266" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="320" y1="246" x2="320" y2="266" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="480" y1="246" x2="480" y2="266" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="640" y1="246" x2="640" y2="266" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#ah)"/>

  <!-- 3. modeling files (self-contained, end-to-end) -->
  <g>
    <rect x="92" y="266" width="136" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="160" y="287" text-anchor="middle" font-size="11.5" fill="#2563eb">qwen2/  package</text>
    <text x="160" y="304" text-anchor="middle" font-size="8.5" fill="#6b7280">modeling_qwen2.py (entry)</text>
    <text x="160" y="318" text-anchor="middle" font-size="8.5" fill="#6b7280">+ config · blocks ·</text>
    <text x="160" y="331" text-anchor="middle" font-size="8.5" fill="#6b7280">tokenizer (own siblings)</text>
    <text x="160" y="345" text-anchor="middle" font-size="8.5" fill="#6b7280">end-to-end</text>

    <rect x="252" y="266" width="136" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="320" y="287" text-anchor="middle" font-size="11.5" fill="#2563eb">llama/  package</text>
    <text x="320" y="310" text-anchor="middle" font-size="8.5" fill="#6b7280">modeling_llama.py</text>
    <text x="320" y="324" text-anchor="middle" font-size="8.5" fill="#6b7280">+ its own siblings</text>
    <text x="320" y="338" text-anchor="middle" font-size="8.5" fill="#6b7280">(full, end-to-end)</text>

    <rect x="412" y="266" width="136" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="480" y="287" text-anchor="middle" font-size="11.5" fill="#2563eb">gemma3/  package</text>
    <text x="480" y="306" text-anchor="middle" font-size="8.5" fill="#6b7280">modeling_gemma3.py</text>
    <text x="480" y="320" text-anchor="middle" font-size="8.5" fill="#6b7280">sandwich norm · QK-norm</text>
    <text x="480" y="334" text-anchor="middle" font-size="8.5" fill="#6b7280">dual RoPE · sliding win</text>

    <rect x="572" y="266" width="136" height="86" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="3 2"/>
    <text x="640" y="297" text-anchor="middle" font-size="11.5" fill="#6b7280">&lt;new&gt;/  package</text>
    <text x="640" y="318" text-anchor="middle" font-size="9" fill="#9ca3af">drop a folder</text>
  </g>

  <text x="400" y="372" text-anchor="middle" font-size="9.5" fill="#6b7280">each package owns its weight-name map + forward; imports only itself + shared infra; duplication across families is intentional</text>

  <!-- families converge into the SHARED loop -->
  <line x1="160" y1="352" x2="160" y2="384" stroke="#6b7280" stroke-width="1.3"/>
  <line x1="320" y1="352" x2="320" y2="384" stroke="#6b7280" stroke-width="1.3"/>
  <line x1="480" y1="352" x2="480" y2="384" stroke="#6b7280" stroke-width="1.3"/>
  <line x1="160" y1="384" x2="480" y2="384" stroke="#6b7280" stroke-width="1.3"/>
  <line x1="320" y1="384" x2="320" y2="396" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- shared generate loop -->
  <rect x="208" y="396" width="224" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="320" y="414" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="600">shared: generate loop + sampler</text>
  <text x="320" y="429" text-anchor="middle" font-size="9" fill="#2563eb">prefill → decode → stop · calls family.forward(ids, state)</text>
  <line x1="320" y1="438" x2="320" y2="454" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- text -->
  <rect x="244" y="454" width="152" height="38" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="320" y="478" text-anchor="middle" font-size="13" fill="#2563eb">text</text>

  <!-- parity note -->
  <rect x="470" y="440" width="300" height="56" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="484" y="460" font-size="11" fill="#111827" font-weight="600">Correctness = parity gate</text>
  <text x="484" y="477" font-size="10" fill="#6b7280">each family: compare logits vs</text>
  <text x="484" y="490" font-size="10" fill="#6b7280">transformers (hf) / llama.cpp (gguf)</text>

  <text x="400" y="532" text-anchor="middle" font-size="10.5" fill="#6b7280" font-weight="600">Study first: thin infra (loader · router · generate loop · sampler), thick self-contained family packages. Reuse is a non-goal.</text>
</svg>
