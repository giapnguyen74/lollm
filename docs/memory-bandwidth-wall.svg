<svg viewBox="0 0 760 462" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img">
  <title>The memory-bandwidth wall in LLM decode</title>
  <desc>Generating one token re-reads every active weight plus the whole KV cache from VRAM through limited memory bandwidth, so the GPU cores idle while waiting on memory. A 70 GB model at 2 TB/s caps at about 28 tokens per second.</desc>
  <rect x="0" y="0" width="760" height="462" fill="#ffffff"/>

  <text x="30" y="34" font-size="15" fill="#111827" font-weight="600">LLM decode is bound by memory bandwidth — not compute</text>
  <text x="30" y="54" font-size="11" fill="#6b7280">To produce one token, the GPU re-reads every active weight + the whole KV cache from VRAM.</text>

  <!-- GPU cores -->
  <rect x="30" y="92" width="180" height="150" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="120" y="114" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">GPU cores</text>
  <g fill="#dbeafe" stroke="#2563eb" stroke-width="1.2">
    <rect x="60"  y="126" width="22" height="22" rx="4"/>
    <rect x="90"  y="126" width="22" height="22" rx="4"/>
    <rect x="120" y="126" width="22" height="22" rx="4"/>
    <rect x="150" y="126" width="22" height="22" rx="4"/>
    <rect x="60"  y="154" width="22" height="22" rx="4"/>
    <rect x="90"  y="154" width="22" height="22" rx="4"/>
    <rect x="120" y="154" width="22" height="22" rx="4"/>
    <rect x="150" y="154" width="22" height="22" rx="4"/>
  </g>
  <text x="120" y="204" text-anchor="middle" font-size="10.5" fill="#2563eb">tens of TFLOP/s</text>
  <text x="120" y="222" text-anchor="middle" font-size="10.5" fill="#6b7280">idle — waiting on memory</text>

  <!-- VRAM -->
  <rect x="550" y="78" width="180" height="170" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="640" y="99" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">VRAM</text>
  <rect x="566" y="110" width="148" height="62" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="131" text-anchor="middle" font-size="11.5" fill="#2563eb" font-weight="600">Weights</text>
  <text x="640" y="152" text-anchor="middle" font-size="15" fill="#2563eb" font-weight="700">~70 GB</text>
  <text x="640" y="166" text-anchor="middle" font-size="9" fill="#6b7280">35B · bf16</text>
  <rect x="566" y="182" width="148" height="52" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="202" text-anchor="middle" font-size="11.5" fill="#2563eb" font-weight="600">KV cache</text>
  <text x="640" y="221" text-anchor="middle" font-size="10" fill="#6b7280">grows every token ↑</text>

  <!-- read path: VRAM -> cores -->
  <line x1="548" y1="120" x2="214" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#aL)"/>
  <text x="380" y="112" text-anchor="middle" font-size="10.5" fill="#2563eb">read: all weights + KV, per token</text>

  <!-- bottleneck -->
  <rect x="318" y="138" width="124" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="380" y="159" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="700">≈ 2 TB/s</text>
  <text x="380" y="177" text-anchor="middle" font-size="9.5" fill="#dc2626">bandwidth = bottleneck</text>

  <!-- write path: cores -> VRAM -->
  <line x1="214" y1="212" x2="548" y2="212" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="380" y="228" text-anchor="middle" font-size="10" fill="#6b7280">write back: activations · new KV</text>

  <defs>
    <marker id="aL" markerWidth="11" markerHeight="11" refX="3" refY="5.5" orient="auto"><path d="M9,1 L3,5.5 L9,10" fill="none" stroke="#2563eb" stroke-width="1.6"/></marker>
    <marker id="aR" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M3,1 L9,5.5 L3,10" fill="none" stroke="#9ca3af" stroke-width="1.6"/></marker>
  </defs>

  <!-- key number -->
  <rect x="30" y="266" width="700" height="38" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="46" y="290" font-size="12.5" fill="#2563eb" font-weight="600">~70 GB of weights  ÷  ~2 TB/s  ≈  28 tokens/sec — fast cores can't raise this ceiling.</text>

  <!-- why -->
  <text x="30" y="336" font-size="12" fill="#111827" font-weight="600">Why it's the wall</text>
  <text x="30" y="356" font-size="11" fill="#6b7280">In decode, each weight loaded does one multiply-add and is discarded — almost no compute per byte moved, so</text>
  <text x="30" y="372" font-size="11" fill="#6b7280">the cores sit idle while VRAM streams. The bytes read per token, not the FLOPs, set the speed.</text>

  <!-- two ways -->
  <text x="30" y="404" font-size="12" fill="#111827" font-weight="600">Two ways past it</text>
  <text x="30" y="424" font-size="11" fill="#6b7280">1 · Move fewer bytes — MoE (fewer active weights) · GQA / linear attention (smaller KV) · quantization.</text>
  <text x="30" y="442" font-size="11" fill="#6b7280">2 · Trade compute for bytes — fuse ops, keep data on-chip (FlashAttention).  ← why we write GPU kernels (Triton).</text>
</svg>
