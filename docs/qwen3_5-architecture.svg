<svg viewBox="0 0 860 700" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img">
  <title>Qwen3.5 hybrid decoder — Gated DeltaNet (linear) vs gated full-attention layer</title>
  <desc>Qwen3.5 / Qwen3.6 is a hybrid decoder: a repeating schedule of 3 Gated-DeltaNet linear-attention layers to 1 gated full-attention layer (full_attention_interval=4, full layers at i%4==3). Both layer kinds share the standard pre-norm shape (input_layernorm, token mixer, residual, post_attention_layernorm, SwiGLU MLP, residual); only the token mixer differs. Linear layers keep a fixed-size (conv_state, recurrent_state) cache; full layers grow a normal KV cache. Blue = Qwen3.5-specific; grey = standard transformer.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="700" fill="#ffffff"/>

  <text x="30" y="28" font-size="14" fill="#111827" font-weight="600">Qwen3.5 / Qwen3.6 decoder — hybrid 3 Gated-DeltaNet : 1 gated-attention</text>
  <text x="30" y="46" font-size="11" fill="#2563eb">blue = Qwen3.5-specific</text>
  <text x="160" y="46" font-size="11" fill="#6b7280">· grey = standard transformer (pre-norm, (1+w) RMSNorm, SwiGLU MLP)</text>

  <!-- schedule strip -->
  <text x="30" y="80" font-size="11" fill="#111827">layer_types (full_attention_interval = 4):</text>
  <g font-size="10" text-anchor="middle">
    <rect x="262" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="275" y="82" fill="#6b7280">L</text>
    <rect x="290" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="303" y="82" fill="#6b7280">L</text>
    <rect x="318" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="331" y="82" fill="#6b7280">L</text>
    <rect x="346" y="68" width="26" height="20" rx="3" fill="#eff6ff" stroke="#2563eb"/><text x="359" y="82" fill="#2563eb">F</text>
    <rect x="374" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="387" y="82" fill="#6b7280">L</text>
    <rect x="402" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="415" y="82" fill="#6b7280">L</text>
    <rect x="430" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="443" y="82" fill="#6b7280">L</text>
    <rect x="458" y="68" width="26" height="20" rx="3" fill="#eff6ff" stroke="#2563eb"/><text x="471" y="82" fill="#2563eb">F</text>
    <rect x="486" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="499" y="82" fill="#6b7280">L</text>
    <rect x="514" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="527" y="82" fill="#6b7280">L</text>
    <rect x="542" y="68" width="26" height="20" rx="3" fill="#f9fafb" stroke="#d1d5db"/><text x="555" y="82" fill="#6b7280">L</text>
    <rect x="570" y="68" width="26" height="20" rx="3" fill="#eff6ff" stroke="#2563eb"/><text x="583" y="82" fill="#2563eb">F</text>
  </g>
  <text x="612" y="82" font-size="10" fill="#6b7280">… L = linear (GDN) · F = full gated-attention</text>

  <!-- ===================== LEFT: LINEAR (GDN) LAYER ===================== -->
  <text x="215" y="110" text-anchor="middle" font-size="12.5" fill="#2563eb" font-weight="600">Linear layer — Gated DeltaNet (3 of every 4)</text>

  <rect x="35" y="120" width="360" height="26" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/>
  <text x="215" y="138" text-anchor="middle" font-size="11.5" fill="#6b7280">input_layernorm · (1+w) RMSNorm</text>
  <line x1="215" y1="146" x2="215" y2="156" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>

  <rect x="35" y="156" width="360" height="172" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="215" y="173" text-anchor="middle" font-size="11" fill="#6b7280">4 input projections — in_proj_qkv · z · b · a</text>
  <rect x="49" y="180" width="332" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="215" y="194" text-anchor="middle" font-size="10" fill="#2563eb">causal Conv1d (k=4, depthwise) + SiLU  → no RoPE</text>
  <rect x="49" y="204" width="332" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="215" y="218" text-anchor="middle" font-size="9.5" fill="#2563eb">split heads · β=σ(b) · g=−exp(A_log)·softplus(a+dt_bias)</text>
  <rect x="49" y="228" width="332" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="215" y="241" text-anchor="middle" font-size="10" fill="#2563eb">delta-rule scan (L2-normed q,k)</text>
  <text x="215" y="254" text-anchor="middle" font-size="9.5" fill="#2563eb">chunked (prefill)  /  recurrent (1-token decode)</text>
  <rect x="49" y="266" width="332" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="215" y="280" text-anchor="middle" font-size="10" fill="#2563eb">RMSNormGated (gate = z)</text>
  <text x="215" y="300" text-anchor="middle" font-size="11" fill="#6b7280">out_proj (value_dim → hidden)</text>
  <text x="215" y="318" text-anchor="middle" font-size="9.5" fill="#2563eb" font-style="italic">state = (conv_state, recurrent_state) — fixed size, no growing KV</text>
  <line x1="215" y1="328" x2="215" y2="338" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>

  <circle cx="215" cy="350" r="12" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/><text x="215" y="355" text-anchor="middle" font-size="13" fill="#111827">+</text>
  <line x1="215" y1="362" x2="215" y2="372" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="35" y="372" width="360" height="26" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/>
  <text x="215" y="390" text-anchor="middle" font-size="11.5" fill="#6b7280">post_attention_layernorm</text>
  <line x1="215" y1="398" x2="215" y2="408" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="35" y="408" width="360" height="36" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/>
  <text x="215" y="430" text-anchor="middle" font-size="11.5" fill="#6b7280">mlp · SwiGLU — down( silu(gate)·up )</text>
  <line x1="215" y1="444" x2="215" y2="454" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>
  <circle cx="215" cy="466" r="12" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/><text x="215" y="471" text-anchor="middle" font-size="13" fill="#111827">+</text>
  <polyline points="215,118 18,118 18,350 201,350" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <polyline points="215,366 26,366 26,466 201,466" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- ===================== RIGHT: FULL GATED ATTENTION LAYER ===================== -->
  <text x="645" y="110" text-anchor="middle" font-size="12.5" fill="#2563eb" font-weight="600">Full layer — gated attention (1 of every 4)</text>

  <rect x="465" y="120" width="360" height="26" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/>
  <text x="645" y="138" text-anchor="middle" font-size="11.5" fill="#6b7280">input_layernorm · (1+w) RMSNorm</text>
  <line x1="645" y1="146" x2="645" y2="156" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>

  <rect x="465" y="156" width="360" height="146" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="645" y="173" text-anchor="middle" font-size="11" fill="#2563eb">q_proj ×2 → query + gate · k/v proj (GQA, n_kv=4)</text>
  <rect x="479" y="180" width="332" height="20" rx="5" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.1"/>
  <text x="645" y="194" text-anchor="middle" font-size="10" fill="#6b7280">q_norm / k_norm — QK-norm</text>
  <rect x="479" y="204" width="332" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="645" y="218" text-anchor="middle" font-size="10" fill="#2563eb">partial RoPE — rotate 64 of 256 (θ=1e7)</text>
  <rect x="479" y="228" width="332" height="20" rx="5" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.1"/>
  <text x="645" y="242" text-anchor="middle" font-size="10" fill="#6b7280">scaled-dot-product attention (KV cache, causal)</text>
  <rect x="479" y="252" width="332" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.1"/>
  <text x="645" y="266" text-anchor="middle" font-size="10" fill="#2563eb">× sigmoid(gate)  — output gate</text>
  <text x="645" y="288" text-anchor="middle" font-size="11" fill="#6b7280">o_proj</text>
  <line x1="645" y1="302" x2="645" y2="312" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>

  <circle cx="645" cy="324" r="12" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/><text x="645" y="329" text-anchor="middle" font-size="13" fill="#111827">+</text>
  <line x1="645" y1="336" x2="645" y2="346" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="465" y="346" width="360" height="26" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/>
  <text x="645" y="364" text-anchor="middle" font-size="11.5" fill="#6b7280">post_attention_layernorm</text>
  <line x1="645" y1="372" x2="645" y2="382" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="465" y="382" width="360" height="36" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/>
  <text x="645" y="404" text-anchor="middle" font-size="11.5" fill="#6b7280">mlp · SwiGLU — down( silu(gate)·up )</text>
  <line x1="645" y1="418" x2="645" y2="428" stroke="#6b7280" stroke-width="1.4" marker-end="url(#ah)"/>
  <circle cx="645" cy="440" r="12" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.4"/><text x="645" y="445" text-anchor="middle" font-size="13" fill="#111827">+</text>
  <polyline points="645,118 448,118 448,324 631,324" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <polyline points="645,340 456,340 456,440 631,440" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- ===================== bottom notes ===================== -->
  <rect x="35" y="520" width="500" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="49" y="539" font-size="11" fill="#2563eb" font-weight="600">Hybrid cache — the one place this touches shared infra</text>
  <text x="49" y="557" font-size="10" fill="#6b7280">Linear layers keep a fixed-size (conv_state, recurrent_state); full layers grow a normal KV.</text>
  <text x="49" y="571" font-size="10" fill="#6b7280">A family-local cache holds both kinds + a single seen_tokens counter (layer 0 is linear → no KV,</text>
  <text x="49" y="585" font-size="10" fill="#6b7280">so positions read seen_tokens, not past[0][0].shape). generate.py still threads it opaquely.</text>
  <text x="49" y="599" font-size="10" fill="#6b7280">Constant memory per token is the whole point of the linear layers.</text>

  <rect x="555" y="520" width="270" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="569" y="539" font-size="11" fill="#2563eb" font-weight="600">MTP head (opt-in, run.py --mtp)</text>
  <text x="569" y="557" font-size="10" fill="#6b7280">1 extra block drafts token t+2; one main</text>
  <text x="569" y="571" font-size="10" fill="#6b7280">forward verifies it (accept → 2 tokens/pass,</text>
  <text x="569" y="585" font-size="10" fill="#6b7280">reject → restore cache snapshot). Output ==</text>
  <text x="569" y="599" font-size="10" fill="#6b7280">greedy exactly. Shares embed_tokens + lm_head.</text>

  <text x="35" y="638" font-size="10" fill="#6b7280">Sizes: 4B = 32 layers (8 full / 24 linear), 27B = 64 layers (16 full / 48 linear). head_dim 256, n_kv 4, vocab 248320, tie=true (4B) / false (27B).</text>
  <text x="35" y="656" font-size="10" fill="#6b7280">Multimodal checkpoint, text-only scope: text LM under model.language_model.* ; vision (model.visual.*) ignored. GDN GGUF not standardized → hard-fail.</text>
</svg>
