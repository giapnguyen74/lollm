<svg viewBox="0 0 800 760" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img">
  <title>Gemma3 decoder layer vs our Qwen2 layer</title>
  <desc>A Gemma3 decoder layer differs from the Qwen2 layer by: (1+weight) RMSNorm, QK-norm before attention, dual RoPE and sliding-window vs full attention per layer type, GeGLU MLP, and sandwich norm (pre and post around both sublayers). Embeddings are scaled by sqrt(hidden) once before layer 0. Blue = differs from our Qwen2 decoder; grey = identical.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="760" fill="#ffffff"/>

  <text x="30" y="30" font-size="14" fill="#111827" font-weight="600">Gemma3 DecoderLayer (× N layers, repeating 5 local : 1 global)</text>
  <text x="30" y="48" font-size="11" fill="#2563eb">blue = differs from our Qwen2 layer</text>
  <text x="250" y="48" font-size="11" fill="#6b7280">· grey = identical</text>

  <!-- embedding scale note -->
  <rect x="160" y="62" width="260" height="36" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="84" text-anchor="middle" font-size="11.5" fill="#2563eb">hidden = embed(ids) × √hidden_size  (before layer 0)</text>
  <line x1="290" y1="98" x2="290" y2="116" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- input_layernorm -->
  <rect x="160" y="116" width="260" height="30" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="136" text-anchor="middle" font-size="12" fill="#2563eb">input_layernorm · (1+w) RMSNorm</text>
  <line x1="290" y1="146" x2="290" y2="160" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- attention box -->
  <rect x="160" y="160" width="260" height="120" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="290" y="178" text-anchor="middle" font-size="12" fill="#6b7280">q / k / v proj (no bias)</text>
  <rect x="172" y="186" width="236" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="290" y="200" text-anchor="middle" font-size="11" fill="#2563eb">q_norm / k_norm — QK-norm</text>
  <rect x="172" y="210" width="236" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="290" y="224" text-anchor="middle" font-size="11" fill="#2563eb">RoPE — θ=10k local · θ=1M global</text>
  <rect x="172" y="234" width="236" height="20" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="290" y="248" text-anchor="middle" font-size="11" fill="#2563eb">attn — sliding-window (local) / full (global)</text>
  <text x="290" y="270" text-anchor="middle" font-size="12" fill="#6b7280">o_proj</text>
  <line x1="290" y1="280" x2="290" y2="294" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- post_attention_layernorm -->
  <rect x="160" y="294" width="260" height="30" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="314" text-anchor="middle" font-size="12" fill="#2563eb">post_attention_layernorm  (post)</text>
  <line x1="290" y1="324" x2="290" y2="340" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- add 1 -->
  <circle cx="290" cy="354" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="290" y="359" text-anchor="middle" font-size="15" fill="#111827">+</text>
  <line x1="290" y1="368" x2="290" y2="384" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- pre_feedforward_layernorm -->
  <rect x="160" y="384" width="260" height="30" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="404" text-anchor="middle" font-size="12" fill="#2563eb">pre_feedforward_layernorm  (pre)</text>
  <line x1="290" y1="414" x2="290" y2="430" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- mlp GeGLU -->
  <rect x="160" y="430" width="260" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="447" text-anchor="middle" font-size="12.5" fill="#2563eb">mlp · GeGLU</text>
  <text x="290" y="462" text-anchor="middle" font-size="10.5" fill="#2563eb">down( gelu(gate)·up )</text>
  <line x1="290" y1="470" x2="290" y2="486" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- post_feedforward_layernorm -->
  <rect x="160" y="486" width="260" height="30" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="506" text-anchor="middle" font-size="12" fill="#2563eb">post_feedforward_layernorm  (post)</text>
  <line x1="290" y1="516" x2="290" y2="532" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- add 2 -->
  <circle cx="290" cy="546" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="290" y="551" text-anchor="middle" font-size="15" fill="#111827">+</text>
  <line x1="290" y1="560" x2="290" y2="582" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- out -->
  <rect x="160" y="582" width="260" height="32" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="290" y="603" text-anchor="middle" font-size="12" fill="#111827">→ next layer</text>

  <!-- residuals -->
  <polyline points="290,114 132,114 132,354 274,354" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <polyline points="290,372 122,372 122,546 274,546" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="100" y="300" font-size="10" fill="#6b7280" transform="rotate(-90 100 300)">residual</text>

  <!-- side notes -->
  <rect x="470" y="160" width="312" height="50" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="484" y="180" font-size="11" fill="#2563eb" font-weight="600">QK-norm</text>
  <text x="484" y="198" font-size="10" fill="#6b7280">Gemma3 replaced Gemma 2's logit soft-capping with this.</text>
  <line x1="470" y1="196" x2="408" y2="196" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4 3"/>

  <rect x="470" y="218" width="312" height="52" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="484" y="238" font-size="11" fill="#2563eb" font-weight="600">5 local : 1 global</text>
  <text x="484" y="256" font-size="10" fill="#6b7280">Layer type sets RoPE θ (10k/1M) AND the mask</text>
  <text x="484" y="268" font-size="10" fill="#6b7280">(sliding window ~1024 vs full causal).</text>
  <line x1="470" y1="240" x2="408" y2="232" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4 3"/>

  <rect x="470" y="294" width="312" height="68" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="484" y="314" font-size="11" fill="#2563eb" font-weight="600">Sandwich norm</text>
  <text x="484" y="332" font-size="10" fill="#6b7280">Norm BEFORE and AFTER each sublayer →</text>
  <text x="484" y="345" font-size="10" fill="#6b7280">4 norms/layer (Qwen2 has 2). Layer wiring</text>
  <text x="484" y="358" font-size="10" fill="#6b7280">change → custom DecoderLayer.</text>
  <line x1="470" y1="312" x2="420" y2="309" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4 3"/>

  <rect x="470" y="430" width="312" height="40" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="484" y="450" font-size="11" fill="#2563eb" font-weight="600">GeGLU</text>
  <text x="484" y="464" font-size="10" fill="#6b7280">gelu(gate) gate, not SiLU.</text>
  <line x1="470" y1="450" x2="420" y2="450" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4 3"/>
</svg>
