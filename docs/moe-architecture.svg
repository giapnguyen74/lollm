<svg viewBox="0 0 780 600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img">
  <title>Mixture-of-Experts feed-forward block</title>
  <desc>A token's hidden vector goes to a router, which softmaxes over all experts and selects the top-k. Only the selected experts run; their outputs are combined by a weighted sum. Attention, RoPE and the KV cache are unchanged.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="ahi" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="780" height="600" fill="#ffffff"/>

  <!-- input token -->
  <rect x="260" y="24" width="260" height="48" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="390" y="44" text-anchor="middle" font-size="13" fill="#111827">normalized hidden  x</text>
  <text x="390" y="61" text-anchor="middle" font-size="11" fill="#6b7280">one token (after post_attn RMSNorm)</text>
  <line x1="390" y1="72" x2="390" y2="102" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- router -->
  <rect x="230" y="104" width="320" height="52" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="390" y="125" text-anchor="middle" font-size="14" fill="#2563eb">router  ·  gate</text>
  <text x="390" y="143" text-anchor="middle" font-size="11" fill="#2563eb">Linear(hidden → n_experts)</text>
  <line x1="390" y1="156" x2="390" y2="186" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ahi)"/>

  <!-- softmax + topk -->
  <rect x="290" y="188" width="200" height="44" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="390" y="206" text-anchor="middle" font-size="13" fill="#2563eb">softmax → top-k</text>
  <text x="390" y="223" text-anchor="middle" font-size="11" fill="#2563eb">pick k experts, renormalize</text>

  <!-- experts row -->
  <!-- inactive experts (dashed grey) -->
  <g>
    <rect x="46"  y="288" width="72" height="72" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.3"/>
    <text x="82"  y="320" text-anchor="middle" font-size="13" fill="#9ca3af">E0</text>
    <text x="82"  y="338" text-anchor="middle" font-size="9" fill="#9ca3af">skip</text>

    <rect x="134" y="288" width="72" height="72" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.3"/>
    <text x="170" y="320" text-anchor="middle" font-size="13" fill="#9ca3af">E1</text>
    <text x="170" y="338" text-anchor="middle" font-size="9" fill="#9ca3af">skip</text>

    <!-- ACTIVE E2 -->
    <rect x="222" y="288" width="72" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
    <text x="258" y="316" text-anchor="middle" font-size="13" fill="#2563eb">E2</text>
    <text x="258" y="333" text-anchor="middle" font-size="9" fill="#2563eb">SwiGLU</text>
    <text x="258" y="346" text-anchor="middle" font-size="9" fill="#2563eb">w1·w3→w2</text>

    <rect x="310" y="288" width="72" height="72" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.3"/>
    <text x="346" y="320" text-anchor="middle" font-size="13" fill="#9ca3af">E3</text>
    <text x="346" y="338" text-anchor="middle" font-size="9" fill="#9ca3af">skip</text>

    <rect x="398" y="288" width="72" height="72" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.3"/>
    <text x="434" y="320" text-anchor="middle" font-size="13" fill="#9ca3af">E4</text>
    <text x="434" y="338" text-anchor="middle" font-size="9" fill="#9ca3af">skip</text>

    <!-- ACTIVE E5 -->
    <rect x="486" y="288" width="72" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
    <text x="522" y="316" text-anchor="middle" font-size="13" fill="#2563eb">E5</text>
    <text x="522" y="333" text-anchor="middle" font-size="9" fill="#2563eb">SwiGLU</text>
    <text x="522" y="346" text-anchor="middle" font-size="9" fill="#2563eb">w1·w3→w2</text>

    <rect x="574" y="288" width="72" height="72" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.3"/>
    <text x="610" y="320" text-anchor="middle" font-size="13" fill="#9ca3af">E6</text>
    <text x="610" y="338" text-anchor="middle" font-size="9" fill="#9ca3af">skip</text>

    <rect x="662" y="288" width="72" height="72" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.3"/>
    <text x="698" y="320" text-anchor="middle" font-size="13" fill="#9ca3af">E7</text>
    <text x="698" y="338" text-anchor="middle" font-size="9" fill="#9ca3af">skip</text>
  </g>

  <!-- fan-out: router selection to experts (active solid blue, inactive dashed grey) -->
  <line x1="390" y1="232" x2="82"  y2="286" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="232" x2="170" y2="286" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="232" x2="258" y2="286" stroke="#2563eb" stroke-width="1.8" marker-end="url(#ahi)"/>
  <line x1="390" y1="232" x2="346" y2="286" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="232" x2="434" y2="286" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="232" x2="522" y2="286" stroke="#2563eb" stroke-width="1.8" marker-end="url(#ahi)"/>
  <line x1="390" y1="232" x2="610" y2="286" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="232" x2="698" y2="286" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- active experts -> weighted sum -->
  <line x1="258" y1="360" x2="378" y2="424" stroke="#2563eb" stroke-width="1.8" marker-end="url(#ahi)"/>
  <line x1="522" y1="360" x2="402" y2="424" stroke="#2563eb" stroke-width="1.8" marker-end="url(#ahi)"/>
  <text x="300" y="398" font-size="10" fill="#2563eb">w₂·</text>
  <text x="470" y="398" font-size="10" fill="#2563eb">w₅·</text>

  <!-- weighted sum -->
  <circle cx="390" cy="438" r="22" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="390" y="444" text-anchor="middle" font-size="18" fill="#2563eb">Σ</text>
  <line x1="390" y1="460" x2="390" y2="488" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ahi)"/>

  <!-- output -->
  <rect x="260" y="490" width="260" height="48" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="390" y="510" text-anchor="middle" font-size="13" fill="#111827">FFN output</text>
  <text x="390" y="527" text-anchor="middle" font-size="11" fill="#6b7280">→ added to the residual stream</text>

  <!-- side note -->
  <rect x="560" y="96" width="200" height="116" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="572" y="120" font-size="11" fill="#111827" font-weight="600">The MoE trade</text>
  <text x="572" y="140" font-size="10.5" fill="#6b7280">N experts live in memory</text>
  <text x="572" y="157" font-size="10.5" fill="#6b7280">only k run per token</text>
  <text x="572" y="174" font-size="10.5" fill="#6b7280">capacity ≫ active compute</text>
  <text x="572" y="197" font-size="10.5" fill="#2563eb">e.g. Mixtral: k=2 of 8</text>

  <!-- footer -->
  <text x="390" y="572" text-anchor="middle" font-size="11" fill="#6b7280">Everything else — attention · GQA · RoPE · KV cache · residuals — is unchanged.</text>
</svg>
